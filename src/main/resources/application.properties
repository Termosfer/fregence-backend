spring.application.name=fregence

# Server Port (Hosting 칲칞칲n laz캼md캼r)
server.port=${PORT:8080}

# Database T톛nziml톛m톛l톛ri (Placeholder-l톛rl톛)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/perfumedb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT Secret
app.jwt.secret=${JWT_SECRET}

# Fayl y칲kl톛m톛 limiti
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Cloudinary Configuration (Professional format)
app.cloudinary.cloud-name=${CLOUDINARY_NAME}
app.cloudinary.api-key=${CLOUDINARY_API_KEY}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET}